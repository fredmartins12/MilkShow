version: "3.8"

# Evolution API + Redis
# MilkShow bot roda como serviço systemd (fora do Docker)

services:

  redis:
    image: redis:7-alpine
    container_name: milkshow_redis
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  evolution:
    image: atendai/evolution-api:latest
    container_name: milkshow_evolution
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      # — Servidor —
      SERVER_URL: "${EVOLUTION_PUBLIC_URL}"        # ex: https://seudominio.com
      # — Autenticação —
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: "${EVOLUTION_KEY}"  # sua chave de acesso
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      # — Redis —
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: "redis://redis:6379/6"
      CACHE_REDIS_TTL: "604800"
      CACHE_LOCAL_ENABLED: "false"
      # — Webhook global (aponta para o bot) —
      WEBHOOK_GLOBAL_URL: "${BOT_URL}/webhook/evolution"
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
      WEBHOOK_EVENTS_MESSAGES_UPDATE: "false"
      WEBHOOK_EVENTS_SEND_MESSAGE: "false"
      WEBHOOK_EVENTS_QRCODE_UPDATED: "false"
      WEBHOOK_EVENTS_CONNECTION_UPDATE: "false"
      # — Instância padrão —
      DEL_INSTANCE: "false"
      # — Armazenamento —
      STORE_CLEANING_INTERVAL: "7200"
      STORE_MESSAGES: "true"
      STORE_MESSAGE_UP: "true"
      STORE_CONTACTS: "true"
    volumes:
      - evolution_data:/evolution/instances
      - evolution_store:/evolution/store

volumes:
  redis_data:
  evolution_data:
  evolution_store:
