version: "3.8"

# Evolution API + Redis + PostgreSQL
# MilkShow bot roda como serviço systemd (fora do Docker)

services:

  postgres:
    image: postgres:16-alpine
    container_name: milkshow_postgres
    restart: always
    environment:
      POSTGRES_DB: evolution
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: milkshow_redis
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  evolution:
    image: atendai/evolution-api:latest
    container_name: milkshow_evolution
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # — Servidor —
      SERVER_URL: "${EVOLUTION_PUBLIC_URL}"
      # — Autenticação —
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: "${EVOLUTION_KEY}"
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      # — Banco de dados —
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: "postgresql"
      DATABASE_CONNECTION_URI: "postgresql://evolution:evolution123@postgres:5432/evolution"
      DATABASE_CONNECTION_CLIENT_NAME: "evolution_client"
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      DATABASE_SAVE_DATA_LABELS: "true"
      DATABASE_SAVE_DATA_HISTORIC: "true"
      # — Redis —
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: "redis://redis:6379/6"
      CACHE_REDIS_TTL: "604800"
      CACHE_LOCAL_ENABLED: "false"
      # — Webhook global (aponta para o bot) —
      WEBHOOK_GLOBAL_URL: "${BOT_URL}/webhook/evolution"
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
      WEBHOOK_EVENTS_MESSAGES_UPDATE: "false"
      WEBHOOK_EVENTS_SEND_MESSAGE: "false"
      WEBHOOK_EVENTS_QRCODE_UPDATED: "false"
      WEBHOOK_EVENTS_CONNECTION_UPDATE: "false"
      # — Instância padrão —
      DEL_INSTANCE: "false"
      # — Armazenamento —
      STORE_CLEANING_INTERVAL: "7200"
      STORE_MESSAGES: "true"
      STORE_MESSAGE_UP: "true"
      STORE_CONTACTS: "true"
    volumes:
      - evolution_data:/evolution/instances
      - evolution_store:/evolution/store

volumes:
  postgres_data:
  redis_data:
  evolution_data:
  evolution_store:
