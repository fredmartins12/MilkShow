version: "3.9"

# Evolution API v2 + PostgreSQL + Redis
# evolution.env é gerado pelo migrate_to_v2.sh (nunca commitado)
# deploy/.env deve conter: POSTGRES_PASSWORD

services:

  postgres:
    image: postgres:16-alpine
    container_name: milkshow_postgres
    restart: always
    environment:
      POSTGRES_DB: evolution
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: milkshow_redis
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  evolution:
    image: evoapicloud/evolution-api:latest
    container_name: milkshow_evolution
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # env_file injeta vars diretamente no processo (evita bug de override interno)
    env_file:
      - evolution.env
    volumes:
      - evolution_instances:/evolution/instances

volumes:
  postgres_data:
  redis_data:
  evolution_instances:
