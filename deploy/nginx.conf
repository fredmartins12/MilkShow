# /etc/nginx/sites-available/milkshow
# Sem domínio: serve em HTTP com security headers.
# Quando tiver domínio: descomentar bloco HTTPS e rodar certbot.

server {
    listen 80;
    server_name milshow.com.br www.milshow.com.br;
    return 301 https://milshow.com.br$request_uri;
}

server {
    listen 443 ssl http2;
    server_name milshow.com.br www.milshow.com.br;

    ssl_certificate     /etc/letsencrypt/live/milshow.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/milshow.com.br/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    client_max_body_size 20M;
    server_tokens off;

    # ── Security headers ───────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"          always;
    add_header X-Frame-Options         "DENY"             always;
    add_header X-XSS-Protection        "1; mode=block"    always;
    add_header Referrer-Policy         "no-referrer"      always;
    add_header Permissions-Policy      "geolocation=(), microphone=(), camera=()" always;
    # Content-Security-Policy — inclui Google Fonts (Inter) e Firebase
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self' https://milshow.com.br https://accounts.google.com https://securetoken.googleapis.com https://firebaseinstallations.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com; worker-src 'self' blob:;" always;

    # ── Rate limiting (nginx nível) ────────────────────────────
    # Definir zonas no nginx.conf principal (/etc/nginx/nginx.conf):
    # limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    # limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # ── App React (PWA) ───────────────────────────────────────
    # Redirect /app → /app/ para não cair no FastAPI
    location = /app {
        return 301 /app/;
    }

    # No-cache para arquivos críticos do PWA (deve vir ANTES do /app/ genérico)
    location ~* ^/app/(index\.html|sw\.js|workbox-[^.]+\.js|registerSW\.js)$ {
        root /opt/milkshow/mobile/dist;
        rewrite ^/app/(.+)$ /$1 break;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location /app/ {
        root /opt/milkshow/mobile/dist;
        rewrite ^/app/$ /index.html break;
        rewrite ^/app/(.+)$ /$1 break;
        try_files $uri $uri/ @app_index;
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }

    location @app_index {
        root /opt/milkshow/mobile/dist;
        try_files /index.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Bot MilkShow (FastAPI) ─────────────────────────────────
    location /api/v1/auth/ {
        # Proteção extra no nginx: max 5 req/min no endpoint de auth
        # limit_req zone=auth burst=3 nodelay;
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

