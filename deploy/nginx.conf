# /etc/nginx/sites-available/milkshow
# Sem domínio: serve em HTTP com security headers.
# Quando tiver domínio: descomentar bloco HTTPS e rodar certbot.

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 20M;
    server_tokens off;

    # ── Security headers ───────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"          always;
    add_header X-Frame-Options         "DENY"             always;
    add_header X-XSS-Protection        "1; mode=block"    always;
    add_header Referrer-Policy         "no-referrer"      always;
    add_header Permissions-Policy      "geolocation=(), microphone=(), camera=()" always;
    # Content-Security-Policy básico — ajustar quando tiver domínio fixo
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://accounts.google.com https://securetoken.googleapis.com;" always;

    # ── Rate limiting (nginx nível) ────────────────────────────
    # Definir zonas no nginx.conf principal (/etc/nginx/nginx.conf):
    # limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    # limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # ── Bot MilkShow (FastAPI) ─────────────────────────────────
    location /api/v1/auth/ {
        # Proteção extra no nginx: max 5 req/min no endpoint de auth
        # limit_req zone=auth burst=3 nodelay;
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

