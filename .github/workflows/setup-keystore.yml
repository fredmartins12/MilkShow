name: Gerar Keystore Android (executar 1x)

on:
  workflow_dispatch:
    inputs:
      alias:
          description: 'Alias da chave (ex: milkshow)'
          default: 'milkshow'
      senha:
          description: 'Senha do keystore (guarde em lugar seguro!)'
          default: 'MilkShow@2026'

jobs:
  gerar-keystore:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gerar Keystore
        run: |
          keytool -genkeypair \
            -alias "${{ github.event.inputs.alias }}" \
            -keypass "${{ github.event.inputs.senha }}" \
            -keystore milkshow.keystore \
            -storepass "${{ github.event.inputs.senha }}" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=MilkShow, OU=App, O=MilkShow, L=Brasil, ST=MG, C=BR" \
            -noprompt

      - name: Exibir keystore em Base64 (copie para GitHub Secrets)
        run: |
          echo "===== KEYSTORE_BASE64 ====="
          base64 milkshow.keystore
          echo "=========================="
          echo ""
          echo "Configure os seguintes GitHub Secrets:"
          echo "  KEYSTORE_BASE64 = (conteúdo acima)"
          echo "  KEY_ALIAS       = ${{ github.event.inputs.alias }}"
          echo "  KEY_PASSWORD    = ${{ github.event.inputs.senha }}"
          echo "  STORE_PASSWORD  = ${{ github.event.inputs.senha }}"

      - name: Upload keystore
        uses: actions/upload-artifact@v4
        with:
          name: milkshow-keystore
          path: milkshow.keystore
          retention-days: 1
