name: Deploy MilkShow

on:
  push:
    branches: [main]
  workflow_dispatch:   # permite disparo manual

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 178.104.252.193
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/milkshow

            # Sincroniza arquivos (sem sobrescrever .env e firebase_key.json)
            git fetch origin main

            # Verifica se mobile mudou antes de resetar os arquivos
            MOBILE_MUDOU=$(git diff HEAD origin/main --name-only 2>/dev/null | grep -c 'mobile/' || true)

            git checkout origin/main -- \
              gestor.py utils.py whatsapp_bot.py mobile_api.py \
              mobile/ pages/ deploy/ docs/ 2>/dev/null || \
            git checkout origin/main -- \
              gestor.py utils.py whatsapp_bot.py mobile_api.py

            # Rebuild do app mobile se arquivos mudaram
            if [ "$MOBILE_MUDOU" -gt 0 ] && [ -d mobile ]; then
              echo "Mobile mudou ($MOBILE_MUDOU arquivo(s)) — rebuilding..."
              cd mobile && npm install --legacy-peer-deps && npm run build
              cp -r dist/. ../mobile_app/
              cd ..
              echo "Build concluído — assets copiados para mobile_app/"
            else
              echo "Mobile sem alterações — skip build"
            fi

            # Reinicia MilkShow bot
            systemctl restart milkshow-bot
            sleep 2
            systemctl is-active milkshow-bot || { journalctl -u milkshow-bot -n 20; exit 1; }

            echo "Deploy concluído!"

      - name: Notify on failure
        if: failure()
        run: echo "Deploy falhou! Verifique os logs acima."
