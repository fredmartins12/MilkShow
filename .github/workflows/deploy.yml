name: Deploy MilkShow

on:
  push:
    branches: [main]
  workflow_dispatch:   # permite disparo manual

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 178.104.252.193
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/milkshow

            # Sincroniza arquivos (sem sobrescrever .env e firebase_key.json)
            git fetch origin main
            git checkout origin/main -- \
              gestor.py utils.py whatsapp_bot.py mobile_api.py \
              pages/ deploy/

            # Rebuild do app mobile se package.json mudou
            if git diff HEAD@{1} --name-only 2>/dev/null | grep -q 'mobile/'; then
              echo "Mobile mudou — rebuilding..."
              cd mobile && npm install && npm run build
              cp -r dist/. ../mobile_app/
              cd ..
            fi

            # Reinicia o bot
            systemctl restart milkshow-bot
            sleep 3
            systemctl is-active milkshow-bot || { journalctl -u milkshow-bot -n 20; exit 1; }
            echo "Deploy concluído!"

      - name: Notify on failure
        if: failure()
        run: echo "Deploy falhou! Verifique os logs acima."
