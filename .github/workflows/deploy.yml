name: Deploy MilkShow

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Build frontend React
        run: |
          cd mobile
          npm ci
          npm run build

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 178.104.252.193
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            git -C /opt/milkshow fetch origin main
            git -C /opt/milkshow checkout origin/main -- \
              whatsapp_bot.py mobile_api.py nutricao.py \
              mobile/src mobile/index.html mobile/package.json mobile/vite.config.js \
              deploy/ firestore.rules requirements.txt 2>/dev/null || true
            /opt/milkshow/venv/bin/pip install --quiet -r /opt/milkshow/requirements.txt
            cp /opt/milkshow/deploy/nginx.conf /etc/nginx/sites-available/milkshow
            nginx -t && systemctl reload nginx
            systemctl stop milkshow-bot
            fuser -k 8000/tcp 2>/dev/null || true
            sleep 2
            systemctl start milkshow-bot
            sleep 4
            systemctl is-active milkshow-bot || { journalctl -u milkshow-bot -n 20 --no-pager; exit 1; }
            echo "Deploy concluído!"

      - name: Upload dist para servidor
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 178.104.252.193
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "mobile/dist/."
          target: "/opt/milkshow/mobile/dist/"
          rm: true

      - name: Notify on failure
        if: failure()
        run: echo "Deploy falhou! Verifique os logs acima."
